<head>

<title>スロット収支ノート</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2315120c'/%3E%3Ccircle cx='50' cy='50' r='30' fill='%23cda24e' stroke='%23ecca7c' stroke-width='3'/%3E%3Ctext x='50' y='52' text-anchor='middle' dominant-baseline='central' font-family='sans-serif' font-size='30' font-weight='700' fill='%235e4715'%3E%C2%A5%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E3%82%B9%E3%83%AD%E3%83%83%E3%83%88%E5%8F%8E%E6%94%AF%E3%83%8E%E3%83%BC%E3%83%88%22%2C%22short_name%22%3A%22%E5%8F%8E%E6%94%AF%E3%83%8E%E3%83%BC%E3%83%88%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2315120c%22%2C%22theme_color%22%3A%22%2315120c%22%2C%22start_url%22%3A%22.%22%7D">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root{
  --bg:#15120c; --panel:#201a12; --panel2:#2a2217; --raised:#332a1c;
  --gold:#cda24e; --gold-bri:#ecca7c; --gold-deep:#a07b32;
  --ink:#efe7d6; --ink-dim:#9b9180; --ink-faint:#6f6757;
  --plus:#73c79b; --plus-bg:rgba(115,199,155,0.13);
  --minus:#e3737e; --minus-bg:rgba(227,115,126,0.12);
  --line:#3a311f;
}
html,body{ margin:0; padding:0; background:var(--bg); }
body{
  color:var(--ink);
  font-family:'Noto Sans JP','Space Grotesk',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh;
  min-height:100dvh; overflow-x:hidden;
}
.num{ font-family:'Space Grotesk',system-ui,sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-0.01em; }
.wrap{
  max-width:520px; margin:0 auto;
  padding:calc(18px + env(safe-area-inset-top)) 14px calc(40px + env(safe-area-inset-bottom));
}
.is-plus{ color:var(--plus); } .is-minus{ color:var(--minus); } .is-flat{ color:var(--ink); }
button{ font-family:inherit; }

.head{ display:flex; align-items:center; gap:10px; margin-bottom:16px; padding:0 2px; }
.coin{ width:28px; height:28px; flex:none; }
.title{ font-size:14.5px; font-weight:700; letter-spacing:0.02em; }
.title small{ display:block; font-size:10px; font-weight:500; color:var(--ink-dim); letter-spacing:0.16em; margin-top:1px; }

.warn{ background:var(--minus-bg); border:1px solid var(--minus); border-radius:11px; padding:10px 13px; font-size:11.5px; line-height:1.6; margin-bottom:14px; color:var(--ink); }

.hero{
  position:relative; overflow:hidden;
  background:
    radial-gradient(120% 100% at 100% 0%, rgba(205,162,78,0.16), transparent 60%),
    linear-gradient(180deg, var(--panel2), var(--panel));
  border:1px solid var(--line); border-radius:16px; padding:15px 18px; margin-bottom:14px;
  display:flex; align-items:flex-end; justify-content:space-between; gap:10px;
}
.hero .lab{ font-size:11px; letter-spacing:0.16em; color:var(--ink-dim); font-weight:600; }
.hero .amt{ font-size:32px; font-weight:700; line-height:1.05; margin-top:3px; }
.hero .amt .y{ font-size:16px; font-weight:600; opacity:0.65; margin-left:2px; }
.hero .side{ text-align:right; flex:none; }
.hero .side .k{ font-size:10px; color:var(--ink-dim); }
.hero .side .v{ font-size:13px; font-weight:600; margin-top:2px; color:var(--ink); }

.tabs{ display:flex; gap:6px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:4px; margin-bottom:16px; }
.tab{ flex:1; border:none; background:transparent; color:var(--ink-dim); border-radius:9px; padding:10px; font-size:13.5px; font-weight:700; cursor:pointer; transition:all .14s; }
.tab.on{ background:var(--raised); color:var(--gold-bri); box-shadow:inset 0 0 0 1px var(--gold-deep); }

.mnav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding:0 2px; }
.mnav .nav{ display:flex; align-items:center; gap:4px; }
.mnav .navbtn{ width:36px; height:36px; border-radius:9px; border:1px solid var(--line); background:var(--panel); color:var(--ink); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.mnav .navbtn:active{ background:var(--raised); }
.mnav .ym{ font-size:16px; font-weight:700; min-width:118px; text-align:center; cursor:pointer; border-radius:8px; padding:4px 6px; }
.mnav .ym:active{ background:var(--panel); }
.mnav .ym .yy{ font-size:12px; color:var(--ink-dim); font-weight:500; margin-right:5px; }
.mnav .msum{ text-align:right; }
.mnav .msum .k{ font-size:9.5px; color:var(--ink-dim); letter-spacing:0.06em; }
.mnav .msum .v{ font-size:15px; font-weight:700; margin-top:1px; }

.wd{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:5px; }
.wd span{ text-align:center; font-size:10.5px; font-weight:600; color:var(--ink-dim); padding:3px 0; }
.wd span.sun{ color:#d98a8a; } .wd span.sat{ color:#88a6cf; }
.cal{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.cell{
  aspect-ratio:1/1.12; border:1px solid var(--line); border-radius:10px; background:var(--panel);
  display:flex; flex-direction:column; align-items:center; padding:5px 2px 3px; cursor:pointer;
  position:relative; overflow:hidden; transition:transform .06s;
}
.cell:active{ transform:scale(0.95); }
.cell.empty{ border:none; background:transparent; pointer-events:none; }
.cell.pos{ background:var(--plus-bg); border-color:rgba(115,199,155,0.3); }
.cell.neg{ background:var(--minus-bg); border-color:rgba(227,115,126,0.3); }
.cell.today{ box-shadow:inset 0 0 0 2px var(--gold); }
.cd{ font-size:12px; font-weight:600; color:var(--ink-dim); font-family:'Space Grotesk',sans-serif; }
.cell.pos .cd, .cell.neg .cd{ color:var(--ink); }
.cd.dow0{ color:#d98a8a; } .cd.dow6{ color:#88a6cf; }
.camt{ margin-top:auto; font-size:11.5px; font-weight:700; font-family:'Space Grotesk',sans-serif; font-variant-numeric:tabular-nums; line-height:1; padding-bottom:1px; }
.camt.pos{ color:var(--plus); } .camt.neg{ color:var(--minus); }
.dots{ position:absolute; top:4px; right:5px; font-size:8.5px; font-weight:700; color:var(--gold); background:var(--raised); border-radius:5px; padding:0 3px; line-height:14px; }

.bigbtn{ width:100%; margin-top:14px; border:none; border-radius:12px; padding:14px; font-size:14.5px; font-weight:700; cursor:pointer; background:linear-gradient(180deg,var(--gold-bri),var(--gold)); color:#241c0c; }
.bigbtn:active{ filter:brightness(0.95); }

.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:18px; }
.stat{ background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:10px 6px; text-align:center; }
.stat .k{ font-size:9.5px; color:var(--ink-dim); }
.stat .v{ font-size:16px; font-weight:700; margin-top:4px; } .stat .v .u{ font-size:10px; color:var(--ink-faint); margin-left:1px; }
.card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px 14px; margin-bottom:14px; }
.card h3{ font-size:12.5px; font-weight:700; margin:0 0 12px; letter-spacing:0.02em; }
.chart{ width:100%; display:block; }
.blank{ text-align:center; color:var(--ink-faint); font-size:12px; padding:24px 0; }

.foot{ margin-top:20px; display:flex; gap:8px; }
.foot button{ flex:1; background:transparent; border:1px solid var(--line); color:var(--ink-faint); border-radius:10px; padding:11px; font-size:12px; font-weight:600; cursor:pointer; }
.foot button:active{ background:var(--panel); }
.tip{ text-align:center; font-size:11px; color:var(--ink-faint); margin-top:16px; line-height:1.7; }

.modal-bg{ position:fixed; inset:0; background:rgba(8,6,3,0.62); -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); display:flex; align-items:flex-end; justify-content:center; z-index:40; animation:fade .15s ease; }
.modal{
  width:100%; max-width:520px; max-height:92vh; max-height:92dvh; overflow-y:auto;
  background:var(--bg); border:1px solid var(--line); border-bottom:none; border-radius:20px 20px 0 0;
  padding:18px 16px calc(28px + env(safe-area-inset-bottom)); animation:slideup .22s cubic-bezier(.2,.8,.2,1);
  -webkit-overflow-scrolling:touch;
}
@keyframes fade{ from{opacity:0} to{opacity:1} }
@keyframes slideup{ from{transform:translateY(26px)} to{transform:translateY(0)} }
.mhead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.mhead .dt{ font-size:18px; font-weight:700; }
.mhead .dt .w{ font-size:13px; color:var(--ink-dim); margin-left:6px; font-weight:500; }
.mhead .dt .dp{ font-size:13px; font-weight:700; margin-left:10px; }
.mhead .x{ width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:transparent; color:var(--ink-dim); font-size:19px; cursor:pointer; }
.mhead .x:active{ background:var(--panel); }

.ypnav{ display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:14px; }
.ypnav .yy{ font-size:18px; font-weight:700; min-width:70px; text-align:center; }
.ypgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:6px; }
.ypcell{ background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:10px 6px; text-align:center; cursor:pointer; color:var(--ink); }
.ypcell:active{ background:var(--raised); }
.ypcell.cur{ box-shadow:inset 0 0 0 2px var(--gold); }
.ypcell .m{ font-size:13px; font-weight:700; color:var(--ink); }
.ypcell .p{ font-size:10.5px; font-weight:600; margin-top:4px; font-variant-numeric:tabular-nums; }
.ypcell .p.is-flat{ color:var(--ink-faint); }

.daylist{ display:flex; flex-direction:column; gap:7px; margin-bottom:14px; }
.di{ display:flex; align-items:center; gap:11px; background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:10px 13px; }
.di.editing{ border-color:var(--gold); box-shadow:0 0 0 2px rgba(205,162,78,0.14); }
.di .mid{ flex:1; min-width:0; cursor:pointer; }
.di .shop{ font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.di .shop .nn{ color:var(--ink-faint); font-weight:500; }
.di .shop .rl{ font-size:10px; color:var(--ink-faint); font-weight:500; }
.di .sub{ font-size:10.5px; color:var(--ink-dim); margin-top:2px; font-variant-numeric:tabular-nums; }
.di .sub b{ color:var(--ink); }
.di .memo-line{ font-size:11px; color:var(--ink-dim); margin-top:5px; white-space:pre-wrap; line-height:1.5; word-break:break-word; }
.di .amt{ font-size:15px; font-weight:700; flex:none; }
.di .del{ width:30px; height:30px; border-radius:7px; border:1px solid var(--line); background:transparent; color:var(--ink-faint); font-size:15px; cursor:pointer; flex:none; }
.di .del:active{ background:var(--panel); }

.fhead{ font-size:12px; font-weight:700; color:var(--ink-dim); margin:2px 2px 10px; letter-spacing:0.03em; }
.row{ display:flex; gap:9px; margin-bottom:11px; }
.field{ flex:1; min-width:0; }
.field label{ display:block; font-size:11px; color:var(--ink-dim); margin-bottom:5px; font-weight:500; }
.field label em{ font-style:normal; color:var(--gold); font-size:9.5px; font-weight:700; margin-left:5px; padding:1px 5px; border:1px solid var(--gold-deep); border-radius:5px; vertical-align:1px; }
.inp{ width:100%; background:var(--panel); border:1px solid var(--line); border-radius:10px; color:var(--ink); padding:12px; font-size:16px; font-weight:600; font-family:'Space Grotesk',sans-serif; font-variant-numeric:tabular-nums; outline:none; transition:border-color .15s, box-shadow .15s; }
.inp::placeholder{ color:var(--ink-faint); font-weight:500; }
.inp:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(205,162,78,0.14); }
.inp.text{ font-family:'Noto Sans JP',sans-serif; font-size:16px; }
.inp.memo{ min-height:60px; resize:vertical; line-height:1.5; }
.suffix{ position:relative; }
.suffix .s{ position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--ink-faint); pointer-events:none; font-weight:500; }
.suffix .inp{ padding-right:32px; }

.rates{ display:flex; flex-wrap:wrap; gap:6px; }
.chip{ border:1px solid var(--line); background:var(--panel); color:var(--ink-dim); border-radius:999px; padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer; transition:all .12s; }
.chip:active{ background:var(--raised); }
.chip.on{ background:var(--gold); border-color:var(--gold); color:#241c0c; }
.chip.custom{ display:flex; align-items:center; gap:4px; padding:4px 7px 4px 12px; }
.chip.custom input{ width:40px; background:transparent; border:none; outline:none; color:inherit; font-size:13px; font-weight:700; text-align:right; font-family:'Space Grotesk',sans-serif; }
.chip.custom.on input{ color:#241c0c; }
.chip.custom input::placeholder{ color:var(--ink-faint); }

.preview{ margin-top:13px; padding:13px 14px; border-radius:12px; background:linear-gradient(180deg, var(--raised), var(--panel2)); border:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px; }
.preview .pk{ font-size:11px; color:var(--ink-dim); }
.preview .calc{ font-size:10.5px; color:var(--ink-faint); margin-top:3px; font-variant-numeric:tabular-nums; }
.preview .pv{ font-size:24px; font-weight:700; flex:none; } .preview .pv .y{ font-size:12px; opacity:.6; margin-left:2px; }

.save{ width:100%; margin-top:13px; border:none; border-radius:11px; padding:14px; font-size:14.5px; font-weight:700; cursor:pointer; background:linear-gradient(180deg,var(--gold-bri),var(--gold)); color:#241c0c; }
.save:active{ filter:brightness(0.95); }
.cancel{ width:100%; margin-top:8px; border:1px solid var(--line); border-radius:11px; padding:12px; font-size:13px; font-weight:600; cursor:pointer; background:transparent; color:var(--ink-dim); }

.toast{ position:fixed; left:50%; bottom:calc(26px + env(safe-area-inset-bottom)); transform:translateX(-50%); background:var(--raised); border:1px solid var(--gold-deep); color:var(--ink); padding:11px 20px; border-radius:999px; font-size:13px; font-weight:600; box-shadow:0 8px 30px rgba(0,0,0,0.4); z-index:60; animation:fade .2s ease; }

@media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <svg class="coin" viewBox="0 0 100 100" fill="none" aria-hidden="true">
      <circle cx="50" cy="50" r="46" fill="#cda24e" stroke="#ecca7c" stroke-width="3"/>
      <circle cx="50" cy="50" r="35" fill="none" stroke="#8f6e2c" stroke-width="2.5"/>
      <text x="50" y="50" text-anchor="middle" dominant-baseline="central" font-family="'Space Grotesk',sans-serif" font-size="34" font-weight="700" fill="#5e4715">¥</text>
    </svg>
    <div class="title">スロット収支ノート<small>MEDAL · RATE · BALANCE</small></div>
  </div>
  <div id="app"></div>
</div>
<input id="importer" type="file" accept="application/json" style="display:none">
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
"use strict";
// ===== 定数 =====
var RATE_PRESETS = [
  { label:"等価", per100:5 }, { label:"5.6枚", per100:5.6 }, { label:"5.8枚", per100:5.8 },
  { label:"6枚", per100:6 }, { label:"6.5枚", per100:6.5 }, { label:"7枚", per100:7 }
];
var SAVE_UNIT = 20;
var WD = ["日","月","火","水","木","金","土"];

// ===== ヘルパー =====
function unitPrice(p){ return 100 / p; }
function pad(n){ return String(n).padStart(2,"0"); }
function yen(n){ return Math.round(n).toLocaleString("ja-JP"); }
function signedYen(n){ return (n>0?"+":n<0?"−":"") + yen(Math.abs(n)); }
function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
function compact(n){
  if(!n) return "";
  var a=Math.abs(n), sign=n>0?"+":"−";
  if(a>=10000){ var v=a/10000; return sign + (v>=10?Math.round(v):(v.toFixed(1).replace(/\.0$/,""))) + "万"; }
  return sign + a;
}
function endTotal(s){
  if(s.cashOutMedals===undefined && s.saveMedals===undefined && s.endMedals!==undefined) return Number(s.endMedals||0);
  return Number(s.cashOutMedals||0) + Number(s.saveMedals||0);
}
function sessionProfit(s){
  var u=unitPrice(Number(s.per100)||5), start=Number(s.startMedals||0), cash=Number(s.cashIn||0);
  if(s.cashOutMedals===undefined && s.saveMedals===undefined && s.endMedals!==undefined){
    return (Number(s.endMedals||0)-start)*u - cash;
  }
  return Number(s.cashOutMedals||0)*u + Number(s.saveMedals||0)*SAVE_UNIT - start*SAVE_UNIT - cash;
}
function buildCalendar(y,m){
  var startDow=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate(), c=[];
  for(var i=0;i<startDow;i++) c.push(null);
  for(var d=1;d<=days;d++) c.push(d);
  while(c.length%7!==0) c.push(null);
  return c;
}
function cls(n){ return n>0?"is-plus":n<0?"is-minus":"is-flat"; }

// ===== ストレージ =====
var STORE_OK = (function(){ try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }catch(e){ return false; } })();
function loadSessions(){ try{ var r=localStorage.getItem("sessions"); return r?JSON.parse(r):[]; }catch(e){ return []; } }
function saveSessions(){ if(!STORE_OK) return; try{ localStorage.setItem("sessions", JSON.stringify(state.sessions)); }catch(e){} }
function loadRate(){ try{ var r=localStorage.getItem("lastRate"); return r?Number(r):5; }catch(e){ return 5; } }
function saveRate(p){ if(!STORE_OK) return; try{ localStorage.setItem("lastRate", String(p)); }catch(e){} }

// ===== 状態 =====
var now = new Date();
var state = {
  sessions: loadSessions(),
  tab: "calendar",
  viewYear: now.getFullYear(),
  viewMonth: now.getMonth(),
  defaultRate: loadRate(),
  selectedDate: null,
  form: null
};
function blankForm(date, per100){
  return { id:null, date:date, shop:"", memo:"", expectedValue:"", startMedals:"", cashIn:"", cashOutMedals:"", saveMedals:"", per100:per100, customRate:"" };
}

// ===== 集計 =====
function byDate(){
  var m={}; state.sessions.forEach(function(s){ (m[s.date]=m[s.date]||[]).push(s); }); return m;
}
function computeStats(){
  var profit=0, cash=0, ev=0, dayMap={};
  state.sessions.forEach(function(s){ var p=sessionProfit(s); profit+=p; cash+=Number(s.cashIn||0); ev+=Number(s.expectedValue||0); dayMap[s.date]=(dayMap[s.date]||0)+p; });
  var days=Object.keys(dayMap).map(function(k){ return dayMap[k]; });
  var wins=days.filter(function(v){ return v>0; }).length;
  return { profit:profit, cash:cash, ev:ev, played:days.length, wins:wins, winRate:days.length?Math.round(wins/days.length*100):0 };
}

// ===== フォーム計算 =====
function activePer100(){ return state.form.per100==="custom" ? (Number(state.form.customRate)||0) : Number(state.form.per100); }
function formProfit(){
  var p=activePer100(); if(p<=0) return 0;
  var u=unitPrice(p), f=state.form;
  return Number(f.cashOutMedals||0)*u + Number(f.saveMedals||0)*SAVE_UNIT - Number(f.startMedals||0)*SAVE_UNIT - Number(f.cashIn||0);
}

// ===== レンダリング =====
var app = document.getElementById("app");
var modalRoot = document.getElementById("modal-root");

function render(){
  var st = computeStats();
  var h = "";
  if(!STORE_OK){
    h += '<div class="warn">この開き方ではデータが端末に保存されません。記録を残すには、後述の「データを書き出す」でバックアップするか、URL形式で開いてください。</div>';
  }
  // ヒーロー
  h += '<div class="hero"><div>'
    + '<div class="lab">累計収支</div>'
    + '<div class="amt num '+cls(st.profit)+'">'+(st.profit>=0?"+":"−")+yen(Math.abs(st.profit))+'<span class="y">円</span></div>'
    + '</div><div class="side">'
    + '<div class="k">来店 '+st.played+'回 · 勝率 '+st.winRate+'%</div>'
    + '<div class="v num">投資 '+yen(st.cash)+'円</div>'
    + '<div class="v num '+cls(st.ev)+'" style="margin-top:3px">期待値 '+signedYen(st.ev)+'円</div>'
    + '</div></div>';
  // タブ
  h += '<div class="tabs">'
    + '<button class="tab '+(state.tab==="calendar"?"on":"")+'" data-act="tab" data-tab="calendar">カレンダー</button>'

    + '</div>';

function renderCalendar(){

    + '<button class="navbtn" data-act="next">›</button>'
    + '</div><div class="msum"><div class="k">月の収支</div>'
    + '<div class="v num '+cls(monthProfit)+'">'+signedYen(monthProfit)+'<span style="font-size:10px;opacity:.6">円</span></div>'
    + '<div class="v num '+cls(monthEv)+'" style="font-size:11.5px;margin-top:2px">期待値 '+signedYen(monthEv)+'<span style="font-size:9px;opacity:.6">円</span></div>'
    + '</div></div>';

  h+='<div class="wd">';
  for(var i=0;i<7;i++) h+='<span class="'+(i===0?"sun":i===6?"sat":"")+'">'+WD[i]+'</span>';

}

// ===== チャート描画 =====
function drawCharts(){
  // 累計推移
  var sorted = state.sessions.slice().sort(function(a,b){ return a.date<b.date?-1:a.date>b.date?1:a.id-b.id; });
  var cum=0, pts=sorted.map(function(s){ cum+=sessionProfit(s); return cum; });
  var cumE=0, evPts=sorted.map(function(s){ cumE+=Number(s.expectedValue||0); return cumE; });
  var tc=document.getElementById("trendChart");
  if(pts.length<1){ tc.innerHTML='<div class="blank">記録するとここに推移が表示されます</div>'; }
  else{
    var W=480,H=150,padX=8,padY=14;
    var data=pts.length===1?[0,pts[0]]:pts;
    var dataE=evPts.length===1?[0,evPts[0]]:evPts;
    var min=Math.min.apply(null,[0].concat(data,dataE)), max=Math.max.apply(null,[0].concat(data,dataE)), span=(max-min)||1;
    var X=function(i){ return padX+(i/((data.length-1)||1))*(W-padX*2); };
    var Y=function(v){ return padY+(1-(v-min)/span)*(H-padY*2); };
    var zeroY=Y(0), line="", lineE="";
    data.forEach(function(v,i){ line+=(i===0?"M":"L")+X(i).toFixed(1)+","+Y(v).toFixed(1)+" "; });
    dataE.forEach(function(v,i){ lineE+=(i===0?"M":"L")+X(i).toFixed(1)+","+Y(v).toFixed(1)+" "; });
    var area=line+"L"+X(data.length-1).toFixed(1)+","+zeroY.toFixed(1)+" L"+X(0).toFixed(1)+","+zeroY.toFixed(1)+" Z";
    var pos=data[data.length-1]>=0, col=pos?"var(--plus)":"var(--minus)";
    var hasEv = evPts.some(function(v){ return v!==0; });
    tc.innerHTML='<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="height:150px">'
      + '<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">'
      + '<stop offset="0%" stop-color="'+col+'" stop-opacity="0.28"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs>'
      + '<line x1="'+padX+'" y1="'+zeroY+'" x2="'+(W-padX)+'" y2="'+zeroY+'" stroke="var(--line)" stroke-width="1" stroke-dasharray="3 3" vector-effect="non-scaling-stroke"/>'
      + '<path d="'+area+'" fill="url(#tg)"/>'
      + '<path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>'
      + (hasEv?'<path d="'+lineE+'" fill="none" stroke="var(--gold-bri)" stroke-width="2" stroke-dasharray="5 4" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>':'')
      + '</svg>';
  }
  // 月別
  var mm={}; state.sessions.forEach(function(s){ var k=s.date?s.date.slice(0,7):null; if(k) mm[k]=(mm[k]||0)+sessionProfit(s); });
  var months=Object.keys(mm).sort().slice(-6).map(function(k){ return [k,mm[k]]; });
  var mc=document.getElementById("monthlyChart");
  if(months.length<1){ mc.innerHTML='<div class="blank">記録するとここに月別収支が表示されます</div>'; return; }
  var mx=Math.max.apply(null,[1].concat(months.map(function(p){ return Math.abs(p[1]); })));
  var mh='<div style="display:flex;align-items:stretch;gap:8px;height:160px">';
  months.forEach(function(p){
    var v=p[1], ratio=Math.abs(v)/mx, isPos=v>=0;
    var bar = isPos
      ? '<div style="height:'+(ratio*50)+'%;margin-bottom:50%;background:linear-gradient(180deg,var(--plus),rgba(115,199,155,0.5));border-radius:4px 4px 0 0"></div>'
      : '<div style="height:'+(ratio*50)+'%;margin-top:50%;background:linear-gradient(180deg,rgba(227,115,126,0.5),var(--minus));border-radius:0 0 4px 4px"></div>';
    mh+='<div style="flex:1;display:flex;flex-direction:column">'
      + '<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;position:relative">'
      + '<div style="position:absolute;bottom:50%;left:0;right:0;border-top:1px dashed var(--line)"></div>'+bar+'</div>'
      + '<div class="num" style="text-align:center;margin-top:6px">'
      + '<div style="font-size:10.5px;font-weight:700;color:'+(isPos?"var(--plus)":"var(--minus)")+'">'+compact(v)+'</div>'
      + '<div style="font-size:9.5px;color:var(--ink-dim);margin-top:2px">'+Number(p[0].slice(5,7))+'月</div>'
      + '</div></div>';
  });
  mh+='</div>';
  mc.innerHTML=mh;
}

}

function openYearPicker(){ state.ypYear=state.viewYear; renderYearPicker(); }

  var y=state.ypYear, monthProfit=[];
  for(var m=0;m<12;m++){
    var prefix=y+"-"+pad(m+1), p=0;

function closeYearPicker(){ modalRoot.innerHTML=""; }

function renderModal(){

function renderDayList(){
  var el=document.getElementById("daylist"); if(!el) return;
  var bd=byDate(), list=bd[state.selectedDate]||[];
  if(list.length===0){ el.innerHTML=""; return; }
  var h='<div class="daylist">';
  list.forEach(function(s){
    var p=sessionProfit(s), diff=endTotal(s)-Number(s.startMedals||0);
    var rl=(RATE_PRESETS.filter(function(r){ return r.per100===s.per100; })[0]||{label:s.per100+"枚"}).label;
    h+='<div class="di '+(state.form.id===s.id?"editing":"")+'">'
      + '<div class="mid" data-act="edit" data-id="'+s.id+'">'
      + '<div class="shop">'+(s.shop?esc(s.shop):'<span class="nn">店名なし</span>')+' <span class="rl">'+esc(rl)+'</span></div>'
      + '<div class="sub">差引 <b class="'+cls(diff)+'">'+(diff>=0?"+":"−")+yen(Math.abs(diff))+'枚</b>'
      + (Number(s.saveMedals)>0?' · 貯玉 <b>'+yen(s.saveMedals)+'枚</b>':'')
      + (Number(s.cashIn)>0?' · 現金 <b>'+yen(s.cashIn)+'円</b>':'')
      + (Number(s.expectedValue)?' · 期待値 <b class="'+cls(Number(s.expectedValue))+'">'+signedYen(Number(s.expectedValue))+'円</b>':'')
      + '</div>'
      + (s.memo?'<div class="memo-line">'+esc(s.memo)+'</div>':'')
      + '</div>'
      + '<div class="amt num '+cls(p)+'">'+signedYen(p)+'</div>'
      + '<button class="del" data-act="del" data-id="'+s.id+'">×</button>'
      + '</div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

function renderForm(){

    chips+='<button type="button" class="chip '+(f.per100===r.per100?"on":"")+'" data-act="rate" data-rate="'+r.per100+'">'+r.label+'</button>';
  });

    + '<input type="number" inputmode="decimal" placeholder="?.?" value="'+esc(f.customRate)+'" data-field="customRate"><span>枚</span></div>';

  var h='<div class="fhead">'+headTxt+'</div>'
    + '<div class="row"><div class="field"><label>店名・機種（任意）</label>'
    + '<input class="inp text" type="text" placeholder="例：◯◯ホール" value="'+esc(f.shop)+'" data-field="shop"></div></div>'
    + '<div class="row"><div class="field"><label>メモ（任意）</label>'
    + '<textarea class="inp text memo" placeholder="立ち回りや設定推測、台番号など" data-field="memo">'+esc(f.memo)+'</textarea></div></div>'
    + '<div class="row"><div class="field"><label>期待値（任意）</label><div class="suffix"><input class="inp" type="number" inputmode="numeric" placeholder="0" value="'+esc(f.expectedValue)+'" data-field="expectedValue"><span class="s">円</span></div></div></div>'
    + '<div class="row">'
    + '<div class="field"><label>開始持ち玉（下ろした貯玉）</label><div class="suffix"><input class="inp" type="number" inputmode="numeric" placeholder="0" value="'+esc(f.startMedals)+'" data-field="startMedals"><span class="s">枚</span></div></div>'
    + '<div class="field"><label>追加の現金投資</label><div class="suffix"><input class="inp" type="number" inputmode="numeric" placeholder="0" value="'+esc(f.cashIn)+'" data-field="cashIn"><span class="s">円</span></div></div>'
    + '</div>'
    + '<div class="row">'
    + '<div class="field"><label>換金した枚数 <em>交換率</em></label><div class="suffix"><input class="inp" type="number" inputmode="numeric" placeholder="0" value="'+esc(f.cashOutMedals)+'" data-field="cashOutMedals"><span class="s">枚</span></div></div>'
    + '<div class="field"><label>貯玉に戻した枚数 <em>等価</em></label><div class="suffix"><input class="inp" type="number" inputmode="numeric" placeholder="0" value="'+esc(f.saveMedals)+'" data-field="saveMedals"><span class="s">枚</span></div></div>'
    + '</div>'
    + '<div class="field" style="margin-bottom:2px"><label>交換率</label><div class="rates">'+chips+'</div></div>'
    + '<div class="preview"><div><div class="pk">この記録の収支</div><div class="calc" id="calcTxt"></div></div>'
    + '<div class="pv num" id="pvVal"></div></div>'
    + '<button class="save" data-act="save">'+(f.id?"更新する":"記録する")+'</button>'
    + (f.id?'<button class="cancel" data-act="cancel">編集をやめる</button>':'');
  el.innerHTML=h;
  updatePreview();
}

function updatePreview(){
  var calc=document.getElementById("calcTxt"), pv=document.getElementById("pvVal");
  if(!calc||!pv) return;
  var p=activePer100(), f=state.form;
  if(p>0){
    var u=unitPrice(p);
    calc.textContent="換金"+Number(f.cashOutMedals||0)+"枚×"+u.toFixed(1)+" ＋ 貯玉"+Number(f.saveMedals||0)+"枚×20 − 元手"+Number(f.startMedals||0)+"枚×20 − 現金"+yen(Number(f.cashIn||0));
    var prof=formProfit();
    pv.className="pv num "+cls(prof);
    pv.innerHTML=signedYen(prof)+'<span class="y">円</span>';
  } else {
    calc.textContent="交換率を入力してください";
    pv.className="pv num is-flat"; pv.innerHTML='—<span class="y">円</span>';
  }
}
function updateChips(){
  var chips=document.querySelectorAll("#formArea .chip");
  chips.forEach(function(c){
    var on=false;
    if(c.classList.contains("custom")) on=state.form.per100==="custom";
    else on=String(state.form.per100)===c.getAttribute("data-rate");
    c.classList.toggle("on", on);
  });
}

// ===== アクション =====
function setRate(per100){
  state.form.per100=per100;
  if(per100!=="custom"){ state.defaultRate=per100; saveRate(per100); }
  updateChips(); updatePreview();
}
function doSave(){
  var p=activePer100(); var f=state.form;
  if(p<=0){ toast("交換率を入力してください"); return; }
  if(f.cashOutMedals===""&&f.saveMedals===""&&f.startMedals===""&&f.cashIn===""){ toast("枚数か金額を入力してください"); return; }
  var rec={ id:f.id||Date.now(), date:f.date, shop:(f.shop||"").trim(), memo:(f.memo||"").trim(),
    expectedValue:Number(f.expectedValue||0),
    startMedals:Number(f.startMedals||0), cashIn:Number(f.cashIn||0),
    cashOutMedals:Number(f.cashOutMedals||0), saveMedals:Number(f.saveMedals||0), per100:p };
  if(f.id){ state.sessions=state.sessions.map(function(s){ return s.id===f.id?rec:s; }); }
  else{ state.sessions.push(rec); }
  saveSessions();
  toast(f.id?"更新しました":"記録しました");
  state.form=blankForm(state.selectedDate, state.defaultRate);
  renderDayList(); renderForm(); render();
}
function editSession(id){
  var s=state.sessions.filter(function(x){ return x.id===id; })[0]; if(!s) return;
  var isPreset=RATE_PRESETS.some(function(r){ return r.per100===s.per100; });
  var legacy=s.cashOutMedals===undefined&&s.saveMedals===undefined&&s.endMedals!==undefined;
  state.form={ id:s.id, date:s.date, shop:s.shop||"", memo:s.memo||"",
    expectedValue:String(s.expectedValue||""),
    startMedals:String(s.startMedals||""), cashIn:String(s.cashIn||""),
    cashOutMedals:String(legacy?(s.endMedals||""):(s.cashOutMedals||"")),
    saveMedals:String(legacy?"":(s.saveMedals||"")),
    per100:isPreset?s.per100:"custom", customRate:isPreset?"":String(s.per100) };
  renderDayList(); renderForm();
  document.querySelector(".modal").scrollTo({top:document.getElementById("formArea").offsetTop-60,behavior:"smooth"});
}
function removeSession(id){
  state.sessions=state.sessions.filter(function(s){ return s.id!==id; });
  saveSessions();
  if(state.form.id===id) state.form=blankForm(state.selectedDate, state.defaultRate);
  renderDayList(); renderForm(); render();
}
function cancelEdit(){ state.form=blankForm(state.selectedDate, state.defaultRate); renderDayList(); renderForm(); }

function exportData(){
  var blob=new Blob([JSON.stringify(state.sessions,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="slot-shushi-"+todayStr()+".json"; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
function importData(e){
  var file=e.target.files&&e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(){
    try{ var arr=JSON.parse(reader.result); if(Array.isArray(arr)){ state.sessions=arr; saveSessions(); render(); toast("読み込みました"); } }
    catch(err){ toast("ファイルを読めませんでした"); }
  };
  reader.readAsText(file); e.target.value="";
}

var toastTimer=null;
function toast(msg){
  var r=document.getElementById("toast-root");
  r.innerHTML='<div class="toast">'+esc(msg)+'</div>';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ r.innerHTML=""; }, 1800);
}

// ===== イベント =====
app.addEventListener("click", function(e){
  var t=e.target.closest("[data-act]"); if(!t) return;
  var act=t.getAttribute("data-act");
  if(act==="tab"){ state.tab=t.getAttribute("data-tab"); render(); }
  else if(act==="prev"){ if(--state.viewMonth<0){ state.viewMonth=11; state.viewYear--; } render(); }
  else if(act==="next"){ if(++state.viewMonth>11){ state.viewMonth=0; state.viewYear++; } render(); }
  else if(act==="day"){ openDay(t.getAttribute("data-date")); }
  else if(act==="yearpick"){ openYearPicker(); }
  else if(act==="today"){ state.viewYear=now.getFullYear(); state.viewMonth=now.getMonth(); render(); openDay(todayStr()); }
  else if(act==="export"){ exportData(); }
  else if(act==="import"){ document.getElementById("importer").click(); }
});
document.getElementById("importer").addEventListener("change", importData);

modalRoot.addEventListener("click", function(e){
  var t=e.target.closest("[data-act]");
  if(t){
    var act=t.getAttribute("data-act");
    if(act==="close"){ closeModal(); }
    else if(act==="bg" && e.target===t){ closeModal(); }
    else if(act==="yp-close"){ closeYearPicker(); }
    else if(act==="yp-bg" && e.target===t){ closeYearPicker(); }
    else if(act==="yp-prev"){ state.ypYear--; renderYearPicker(); }
    else if(act==="yp-next"){ state.ypYear++; renderYearPicker(); }
    else if(act==="yp-month"){ state.viewYear=state.ypYear; state.viewMonth=Number(t.getAttribute("data-m")); closeYearPicker(); render(); }
    else if(act==="rate"){ setRate(Number(t.getAttribute("data-rate"))); }
    else if(act==="rate-custom"){ setRate("custom"); var ci=t.querySelector("input"); if(ci) ci.focus(); }
    else if(act==="save"){ doSave(); }
    else if(act==="cancel"){ cancelEdit(); }
    else if(act==="edit"){ editSession(Number(t.getAttribute("data-id"))); }
    else if(act==="del"){ removeSession(Number(t.getAttribute("data-id"))); }
  }
});
modalRoot.addEventListener("input", function(e){
  var t=e.target.closest("[data-field]"); if(!t) return;
  var field=t.getAttribute("data-field");
  state.form[field]=t.value;
  if(field==="customRate" && state.form.per100!=="custom"){ state.form.per100="custom"; updateChips(); }
  updatePreview();
});

// ===== 起動 =====
render();
</script>
</body>
</html>
